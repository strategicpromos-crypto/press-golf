<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── PWA / Home Screen Icon ─────────────────────────── -->
    <link rel="icon" type="image/png" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icon-120.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ── iOS Full Screen / Splash ───────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Press" />

    <!-- ── Android / General ──────────────────────────────── -->
    <meta name="theme-color" content="#080f0a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Press" />

    <!-- ── Viewport ───────────────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Press Golf</title>
    <style>
      html, body, #root { background-color: #080f0a; margin: 0; padding: 0; }
    </style>
  </head>
  <body style="background-color:#080f0a;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
